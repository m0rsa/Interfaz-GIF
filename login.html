<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="color-scheme" content="dark">
<title>Acceso · Finanzas</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
@font-face{font-family:'SF Pro';font-weight:400;font-display:swap;src:url('https://cdn.jsdelivr.net/npm/@fontsource/inter@5/files/inter-latin-400-normal.woff2') format('woff2')}
@font-face{font-family:'SF Pro';font-weight:600;font-display:swap;src:url('https://cdn.jsdelivr.net/npm/@fontsource/inter@5/files/inter-latin-600-normal.woff2') format('woff2')}
@font-face{font-family:'SF Pro';font-weight:700;font-display:swap;src:url('https://cdn.jsdelivr.net/npm/@fontsource/inter@5/files/inter-latin-700-normal.woff2') format('woff2')}
@font-face{font-family:'SF Pro';font-weight:800;font-display:swap;src:url('https://cdn.jsdelivr.net/npm/@fontsource/inter@5/files/inter-latin-800-normal.woff2') format('woff2')}

*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#000000;--surf:#15131B;--surf2:#1D1A26;
  --bd:rgba(255,255,255,0.07);--bd2:rgba(255,255,255,0.11);
  --tx:#F2F1F7;--tx2:#A7A1BC;--tx3:#6E687E;
  --blue:#9D5CF5;--blue-h:#8A45E8;--green:#6FB85C;--red:#F0573C;
}
html,body{height:100%;background:var(--bg);overflow:hidden}
body{font-family:'SF Pro',-apple-system,BlinkMacSystemFont,sans-serif;color:var(--tx)}

/* ── FONDO ── */
.lbg{position:fixed;inset:0;overflow:hidden;pointer-events:none}
.orb{position:absolute;border-radius:50%}
.orb-1{width:700px;height:700px;top:-280px;left:50%;background:radial-gradient(ellipse,rgba(157,92,245,0.13) 0%,transparent 62%);animation:o1 9s ease-in-out infinite}
.orb-2{width:500px;height:500px;bottom:-180px;right:-120px;background:radial-gradient(ellipse,rgba(208,122,208,0.08) 0%,transparent 65%);animation:o2 11s ease-in-out infinite}
@keyframes o1{0%,100%{transform:translateX(-50%) translateY(0)} 50%{transform:translateX(-50%) translateY(-22px)}}
@keyframes o2{0%,100%{transform:translateY(0)} 50%{transform:translateY(-18px)}}

/* ── LAYOUT ── */
.wrap{position:relative;z-index:1;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{width:100%;max-width:372px}

/* ── LOGO ── */
.logo{text-align:center;margin-bottom:30px}
.logo-icon{width:58px;height:58px;background:linear-gradient(135deg,#C9A6FF 0%,var(--blue) 100%);border-radius:17px;display:inline-flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;color:#fff;font-family:'SF Mono',ui-monospace,monospace;margin-bottom:14px;box-shadow:0 8px 32px rgba(157,92,245,0.4),0 0 0 1px rgba(157,92,245,0.2)}
.logo-name{font-size:22px;font-weight:800;letter-spacing:-0.03em;background:linear-gradient(135deg,#D8C2FF 0%,var(--blue) 70%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px}
.logo-sub{font-size:12px;color:var(--tx3)}

/* ── STEP INDICATOR ── */
.steps{display:flex;align-items:center;justify-content:center;gap:0;margin-bottom:22px}
.s-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;border:2px solid var(--bd2);color:var(--tx3);background:var(--surf2);transition:all 0.35s;flex-shrink:0}
.s-dot.active{background:var(--blue);border-color:var(--blue);color:#fff;box-shadow:0 2px 12px rgba(157,92,245,0.4)}
.s-dot.done{background:var(--green);border-color:var(--green);color:#fff;box-shadow:0 2px 10px rgba(111,184,92,0.35)}
.s-line{width:48px;height:2px;background:var(--bd2);transition:background 0.4s}
.s-line.done{background:var(--green)}

/* ── FORM CARD ── */
.fc{background:rgba(18,16,24,0.88);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:28px 30px 30px;backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);box-shadow:0 32px 80px rgba(0,0,0,0.55),inset 0 1px 0 rgba(255,255,255,0.07)}
.step-panel{display:none}
.step-panel.visible{display:block;animation:panelIn 0.3s ease both}
@keyframes panelIn{from{opacity:0;transform:translateX(14px)} to{opacity:1;transform:translateX(0)}}

/* ── STEP HEADER ── */
.sh{margin-bottom:20px}
.sh-title{font-size:16px;font-weight:700;letter-spacing:-0.02em;color:var(--tx);margin-bottom:3px}
.sh-sub{font-size:12px;color:var(--tx3)}

/* ── INPUTS ── */
.field{margin-bottom:16px}
.flabel{font-size:10px;font-weight:800;color:var(--tx2);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:7px;display:block}
.finput{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.09);border-radius:10px;color:var(--tx);font-size:15px;padding:12px 14px;font-family:inherit;outline:none;transition:border-color 0.15s,box-shadow 0.15s;-webkit-appearance:none}
.finput:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(157,92,245,0.16)}
.finput.err{border-color:rgba(240,87,60,0.5)}
.pw-wrap{position:relative}
.pw-wrap .finput{padding-right:46px}
.eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--tx3);cursor:pointer;padding:5px;border-radius:6px;transition:color 0.15s,background 0.15s;line-height:1;display:flex;align-items:center}
.eye:hover{color:var(--tx2);background:rgba(255,255,255,0.06)}
.attempts{font-size:11px;color:var(--tx3);min-height:14px;text-align:right;margin-top:5px}
.attempts.warn{color:#F5A944}
.attempts.danger{color:var(--red)}
.ferr{font-size:12px;color:var(--red);min-height:14px;text-align:center;margin:12px 0 4px;line-height:1.5;padding:0;border-radius:9px;transition:all 0.2s}
.ferr.show{background:rgba(240,87,60,0.10);border:1px solid rgba(240,87,60,0.18);padding:9px 12px}
.ferr.lock{background:rgba(245,169,68,0.10);border:1px solid rgba(245,169,68,0.22);color:#F5A944}

/* ── BUTTONS ── */
.submit{width:100%;padding:13px;border-radius:11px;border:none;background:var(--blue);color:#fff;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.18s;font-family:inherit;letter-spacing:-0.01em;box-shadow:0 2px 14px rgba(157,92,245,0.38);display:flex;align-items:center;justify-content:center;gap:9px}
.submit:hover:not(:disabled){background:var(--blue-h);box-shadow:0 4px 22px rgba(157,92,245,0.52);transform:translateY(-1px)}
.submit:disabled{opacity:0.55;cursor:not-allowed;transform:none!important}
.back{background:none;border:none;color:var(--tx3);font-size:12px;cursor:pointer;margin-top:14px;padding:4px 0;font-family:inherit;transition:color 0.15s;display:block;text-align:center;width:100%}
.back:hover{color:var(--tx2)}
.spinner{width:16px;height:16px;border:2.5px solid rgba(255,255,255,0.28);border-top-color:#fff;border-radius:50%;animation:sp 0.65s linear infinite;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="lbg"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>
<div class="wrap">
  <div class="card">

    <!-- Logo -->
    <div class="logo">
      <div class="logo-icon">$</div>
      <div class="logo-name">Finanzas</div>
      <div class="logo-sub">Panel financiero personal</div>
    </div>

    <!-- Step indicator -->
    <div class="steps">
      <div class="s-dot active" id="sd1">1</div>
      <div class="s-line" id="sl1"></div>
      <div class="s-dot" id="sd2">2</div>
      <div class="s-line" id="sl2" style="display:none"></div>
      <div class="s-dot" id="sd3" style="display:none">3</div>
    </div>

    <!-- Form card -->
    <div class="fc">

      <!-- Paso 1: código de acceso -->
      <div class="step-panel visible" id="step-gate">
        <div class="sh">
          <div class="sh-title">Código de acceso</div>
          <div class="sh-sub">Ingresá el código para continuar</div>
        </div>
        <form onsubmit="checkGate();return false" autocomplete="off">
          <div class="field">
            <label class="flabel" for="gate-input">Código</label>
            <div class="pw-wrap">
              <input class="finput" type="password" id="gate-input" placeholder="••••••••" autocomplete="off" required>
              <button type="button" class="eye" onclick="toggleEye('gate-input','gate-eye')" title="Mostrar código">
                <svg id="gate-eye" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
            <div id="gate-attempts" class="attempts"></div>
          </div>
          <div id="gate-error" class="ferr"></div>
          <button type="submit" id="gate-btn" class="submit">Continuar</button>
        </form>
      </div>

      <!-- Paso 2: login Supabase -->
      <div class="step-panel" id="step-login">
        <div class="sh">
          <div class="sh-title">Iniciar sesión</div>
          <div class="sh-sub">Ingresá tus credenciales</div>
        </div>
        <form onsubmit="doLogin();return false" autocomplete="on">
          <div class="field">
            <label class="flabel" for="login-email">Email</label>
            <input class="finput" type="email" id="login-email" placeholder="tu@email.com" autocomplete="email" required>
          </div>
          <div class="field">
            <label class="flabel" for="login-password">Contraseña</label>
            <div class="pw-wrap">
              <input class="finput" type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" required>
              <button type="button" class="eye" onclick="toggleEye('login-password','login-eye')" title="Mostrar contraseña">
                <svg id="login-eye" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
            <div id="login-attempts" class="attempts"></div>
          </div>
          <div id="login-error" class="ferr"></div>
          <button type="submit" id="login-btn" class="submit">Ingresar</button>
        </form>
        <button class="back" onclick="showGate()">← Volver al código de acceso</button>
      </div>

      <!-- Paso 3: 2FA TOTP (solo aparece si el usuario tiene MFA activado) -->
      <div class="step-panel" id="step-mfa">
        <div class="sh">
          <div class="sh-title">Verificación en dos pasos</div>
          <div class="sh-sub">Ingresá el código de tu app autenticadora</div>
        </div>
        <form onsubmit="doMFA();return false" autocomplete="off">
          <div class="field">
            <label class="flabel" for="mfa-code">Código de 6 dígitos</label>
            <input class="finput" type="text" id="mfa-code" placeholder="000 000" maxlength="7" inputmode="numeric" autocomplete="one-time-code" style="font-family:'SF Mono',ui-monospace,monospace;letter-spacing:0.18em;font-size:20px;text-align:center">
          </div>
          <div id="mfa-error" class="ferr"></div>
          <button type="submit" id="mfa-btn" class="submit">Verificar</button>
        </form>
      </div>

    </div><!-- /fc -->
  </div><!-- /card -->
</div><!-- /wrap -->

<script>
/* ── CONFIG ── */
const SUPA_URL='__SUPA_URL__';
const SUPA_KEY='__SUPA_KEY__';

const sb=supabase.createClient(SUPA_URL,SUPA_KEY);

/* ── TOGGLE EYE ── */
const EYE_OPEN='<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
const EYE_SHUT='<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
function toggleEye(inputId,svgId){
  const inp=document.getElementById(inputId),svg=document.getElementById(svgId);
  inp.type=inp.type==='password'?'text':'password';
  svg.innerHTML=inp.type==='password'?EYE_OPEN:EYE_SHUT;
}

/* ── STEP UI ── */
function showGate(){
  ['step-login','step-mfa'].forEach(id=>document.getElementById(id).classList.remove('visible'));
  document.getElementById('step-gate').classList.add('visible');
  document.getElementById('sd1').className='s-dot active';
  document.getElementById('sd2').className='s-dot';
  document.getElementById('sl1').classList.remove('done');
  ['sl2','sd3'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById('gate-input').value='';
  document.getElementById('gate-error').textContent=''; document.getElementById('gate-error').className='ferr';
  setTimeout(()=>document.getElementById('gate-input').focus(),100);
}
function showLogin(){
  document.getElementById('step-gate').classList.remove('visible');
  document.getElementById('step-login').classList.add('visible');
  document.getElementById('sd1').className='s-dot done';
  document.getElementById('sd2').className='s-dot active';
  document.getElementById('sl1').classList.add('done');
  setTimeout(()=>document.getElementById('login-email').focus(),100);
}

/* ── MFA STEP ── */
let _mfaFactorId=null, _mfaChallengeId=null;

async function showMFA(){
  const{data:{totp}}=await sb.auth.mfa.listFactors();
  _mfaFactorId=totp[0]?.id;
  if(!_mfaFactorId){ window.location.replace('finanzas.html'); return; }
  const{data:ch}=await sb.auth.mfa.challenge({factorId:_mfaFactorId});
  _mfaChallengeId=ch.id;
  document.getElementById('step-login').classList.remove('visible');
  document.getElementById('step-mfa').classList.add('visible');
  document.getElementById('sd2').className='s-dot done';
  document.getElementById('sl1').classList.add('done');
  document.getElementById('sl2').style.display='';
  document.getElementById('sd3').style.display='';
  document.getElementById('sd3').className='s-dot active';
  const inp=document.getElementById('mfa-code');
  inp.value='';
  inp.oninput=function(){
    this.value=this.value.replace(/\D/g,'');
    if(this.value.length===6) doMFA();
  };
  setTimeout(()=>inp.focus(),100);
}

async function doMFA(){
  const code=(document.getElementById('mfa-code').value||'').replace(/\D/g,'');
  if(code.length!==6) return;
  const errEl=document.getElementById('mfa-error');
  const btn=document.getElementById('mfa-btn');
  btn.disabled=true; btn.innerHTML='<div class="spinner"></div> Verificando…';
  const{error}=await sb.auth.mfa.verify({factorId:_mfaFactorId,challengeId:_mfaChallengeId,code});
  btn.disabled=false; btn.innerHTML='Verificar';
  if(error){
    errEl.textContent='Código incorrecto o expirado.'; errEl.className='ferr show';
    document.getElementById('mfa-code').value='';
    document.getElementById('mfa-code').focus();
    const{data:ch}=await sb.auth.mfa.challenge({factorId:_mfaFactorId});
    _mfaChallengeId=ch.id;
    return;
  }
  window.location.replace('finanzas.html');
}

/* ── GATE RATE LIMIT ── */
const GATE_MAX=3, GATE_LOCK_MS=10*60*1000;
let gAttempts=parseInt(sessionStorage.getItem('_ga')||'0');
let gLockUntil=parseInt(sessionStorage.getItem('_gl')||'0');
let gTimer=null;

function gLockRem(){ return Math.max(0,gLockUntil-Date.now()); }
function gSetA(n){ gAttempts=n; sessionStorage.setItem('_ga',n); }
function gSetL(u){ gLockUntil=u; sessionStorage.setItem('_gl',u); }

function gUpdateUI(){
  const attEl=document.getElementById('gate-attempts');
  const errEl=document.getElementById('gate-error');
  const btn=document.getElementById('gate-btn');
  const rem=gLockRem();
  if(rem>0){
    const min=Math.floor(rem/60000),sec=Math.floor((rem%60000)/1000);
    errEl.textContent=`Demasiados intentos. Esperá ${min}:${String(sec).padStart(2,'0')}.`;
    errEl.className='ferr show lock'; btn.disabled=true; if(attEl)attEl.textContent='';
  } else {
    if(errEl.classList.contains('lock')){ errEl.textContent=''; errEl.className='ferr'; }
    btn.disabled=false;
    const left=GATE_MAX-gAttempts;
    if(attEl && gAttempts>0){
      attEl.textContent=`${left} intento${left!==1?'s':''} restante${left!==1?'s':''}`;
      attEl.className='attempts'+(gAttempts>=GATE_MAX-1?' danger':gAttempts>=1?' warn':'');
    } else if(attEl){ attEl.textContent=''; attEl.className='attempts'; }
  }
}

function gStartTimer(){
  clearInterval(gTimer);
  gTimer=setInterval(()=>{
    gUpdateUI();
    if(gLockRem()<=0){ clearInterval(gTimer); gSetA(0); gSetL(0); gUpdateUI(); }
  },1000);
}

/* ── CHECK GATE ── */
async function checkGate(){
  if(gLockRem()>0) return;
  const val=document.getElementById('gate-input').value;
  if(!val) return;
  const btn=document.getElementById('gate-btn');
  const errEl=document.getElementById('gate-error');
  btn.disabled=true; btn.innerHTML='<div class="spinner"></div>';
  // Validación del código en el servidor (Edge Function); el hash nunca está en el cliente
  let ok=false, neterr=false;
  try{
    const r=await fetch(SUPA_URL+'/functions/v1/gate-verify',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+SUPA_KEY,'apikey':SUPA_KEY},body:JSON.stringify({code:val})});
    ok=(await r.json()).ok===true;
  }catch(e){ neterr=true; }
  btn.disabled=false; btn.innerHTML='Continuar';
  if(neterr){ errEl.textContent='Error de conexión. Probá de nuevo.'; errEl.className='ferr show'; return; }
  if(!ok){
    gSetA(gAttempts+1);
    document.getElementById('gate-input').classList.add('err');
    if(gAttempts>=GATE_MAX){
      gSetL(Date.now()+GATE_LOCK_MS); gStartTimer();
    } else {
      errEl.textContent='Código incorrecto.'; errEl.className='ferr show';
      gUpdateUI();
      document.getElementById('gate-input').value='';
      document.getElementById('gate-input').focus();
    }
    return;
  }
  gSetA(0); gSetL(0);
  sessionStorage.setItem('_gk','ok');
  document.getElementById('gate-input').classList.remove('err');
  showLogin();
}

/* ── LOGIN RATE LIMIT ── */
const LOGIN_MAX=5, LOGIN_LOCK_MS=15*60*1000;
let lAttempts=parseInt(sessionStorage.getItem('_la')||'0');
let lLockUntil=parseInt(sessionStorage.getItem('_ll')||'0');
let lTimer=null;

function lLockRem(){ return Math.max(0,lLockUntil-Date.now()); }
function lSetA(n){ lAttempts=n; sessionStorage.setItem('_la',n); }
function lSetL(u){ lLockUntil=u; sessionStorage.setItem('_ll',u); }

function lUpdateUI(){
  const attEl=document.getElementById('login-attempts');
  const errEl=document.getElementById('login-error');
  const btn=document.getElementById('login-btn');
  const rem=lLockRem();
  if(rem>0){
    const min=Math.floor(rem/60000),sec=Math.floor((rem%60000)/1000);
    errEl.textContent=`Demasiados intentos. Esperá ${min}:${String(sec).padStart(2,'0')}.`;
    errEl.className='ferr show lock'; btn.disabled=true; if(attEl)attEl.textContent='';
  } else {
    if(errEl.classList.contains('lock')){ errEl.textContent=''; errEl.className='ferr'; }
    btn.disabled=false;
    const left=LOGIN_MAX-lAttempts;
    if(attEl && lAttempts>0){
      attEl.textContent=`${left} intento${left!==1?'s':''} restante${left!==1?'s':''}`;
      attEl.className='attempts'+(lAttempts>=LOGIN_MAX-1?' danger':lAttempts>=2?' warn':'');
    } else if(attEl){ attEl.textContent=''; attEl.className='attempts'; }
  }
}

function lStartTimer(){
  clearInterval(lTimer);
  lTimer=setInterval(()=>{
    lUpdateUI();
    if(lLockRem()<=0){ clearInterval(lTimer); lSetA(0); lSetL(0); lUpdateUI(); }
  },1000);
}

/* ── DO LOGIN ── */
async function doLogin(){
  if(lLockRem()>0) return;
  const email=(document.getElementById('login-email')?.value||'').trim();
  const pw=document.getElementById('login-password')?.value||'';
  const errEl=document.getElementById('login-error');
  if(!email||!pw){ errEl.textContent='Completá los dos campos.'; errEl.className='ferr show'; return; }
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){ errEl.textContent='El email no es válido.'; errEl.className='ferr show'; return; }
  errEl.textContent=''; errEl.className='ferr';
  const btn=document.getElementById('login-btn');
  btn.disabled=true; btn.innerHTML='<div class="spinner"></div> Verificando…';
  const{error}=await sb.auth.signInWithPassword({email,password:pw});
  btn.disabled=false; btn.innerHTML='Ingresar';
  if(error){
    lSetA(lAttempts+1);
    document.getElementById('login-password').value='';
    document.getElementById('login-email').classList.add('err');
    document.getElementById('login-password').classList.add('err');
    if(lAttempts>=LOGIN_MAX){
      lSetL(Date.now()+LOGIN_LOCK_MS); lStartTimer();
    } else {
      errEl.textContent='Email o contraseña incorrectos.'; errEl.className='ferr show';
      lUpdateUI();
      document.getElementById('login-password').focus();
    }
    return;
  }
  lSetA(0); lSetL(0);
  const{data:aal}=await sb.auth.mfa.getAuthenticatorAssuranceLevel();
  if(aal?.nextLevel==='aal2'){ await showMFA(); return; }
  window.location.replace('finanzas.html');
}

/* ── INIT ── */
window.addEventListener('load',async()=>{
  // Inicializar rate limits
  gUpdateUI(); lUpdateUI();
  if(gLockRem()>0) gStartTimer();
  if(lLockRem()>0) lStartTimer();

  // Si ya hay sesión activa + gate válida → redirigir directo
  const gk=sessionStorage.getItem('_gk');
  const{data:{session}}=await sb.auth.getSession();
  if(session && gk){ window.location.replace('finanzas.html'); return; }

  // Si el gate ya fue pasado → ir a paso 2
  if(gk){ showLogin(); return; }

  // Caso base: empezar en paso 1
  setTimeout(()=>document.getElementById('gate-input').focus(),80);
});
</script>
